<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>propaganda+</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fbfbf9;
      color: #111;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
    }

    /* ── site header ── */
    .site-header {
      display: flex;
      justify-content: center;
      padding: 1.4rem 1.8rem;
      border-bottom: 1px solid #e4e4e0;
    }

    .site-logo {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.35em;
    }

    /* ── release block ── */
    .release {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #e4e4e0;
    }

    .release-cover {
      width: 100%;
      display: block;
    }

    .release-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1rem 1.8rem;
      border-bottom: 1px solid #e4e4e0;
    }

    .release-artist {
      font-size: 0.85rem;
      font-weight: 200;
      letter-spacing: 0.25em;
    }

    .release-num {
      font-size: 0.78rem;
      font-weight: 200;
      letter-spacing: 0.25em;
      color: #888;
    }

    /* ── links ── */
    .links {
      display: flex;
      flex-direction: column;
      padding: 0 1.8rem;
    }

    .stream-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.3rem 0;
      border-bottom: 1px solid #e4e4e0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      transition: opacity 0.1s, letter-spacing 0.2s;
    }

    .stream-link:last-child { border-bottom: none; }
    .stream-link:hover { opacity: 0.5; letter-spacing: 0.28em; }

    .spotify    { color: #1DB954; }
    .apple      { color: #fc3c44; }
    .youtube    { color: #CC0000; }
    .ytmusic    { color: #CC0000; }
    .soundcloud { color: #f26f23; }
    .deezer     { color: #A238FF; }
    .presave    { color: #e8a020; }

    .arrow {
      font-size: 0.6rem;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .foot {
      padding: 2rem 1.8rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      font-weight: 300;
      color: #ccc;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #040406; color: #f0ede6; }
      .site-header, .release, .release-meta, .stream-link { border-color: #1c1c20; }
      .site-logo, .release-artist { color: #fff; }
      .foot { color: #333; }
      .release-cover { filter: invert(1); }
    }
  </style>
</head>
