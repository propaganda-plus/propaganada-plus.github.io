<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>p+Loser</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fbfbf9;
      color: #111;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .cover {
      width: 100%;
      display: block;
    }

    .strip {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1.4rem 1.8rem;
      border-bottom: 1px solid #e4e4e0;
      border-top: 1px solid #e4e4e0;
    }

    .wordmark {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3em;
    }

    .label {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: #bbb;
    }

    .links {
      display: flex;
      flex-direction: column;
      padding: 0 1.8rem;
      flex: 1;
    }

    .stream-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.3rem 0;
      border-bottom: 1px solid #e4e4e0;
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      transition: color 0.1s, letter-spacing 0.2s;
    }

    .stream-link1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.3rem 0;
      border-bottom: 1px solid #e4e4e0;
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      transition: color 0.1s, letter-spacing 0.2s;
    }

    .stream-link:first-child { border-top: 1px solid #e4e4e0; margin-top: 0.4rem; }
    .stream-link:hover { color: #aaa; letter-spacing: 0.28em; }

    .arrow {
      font-size: 0.6rem;
      color: #ccc;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .stream-link:hover .arrow { color: #aaa; }

    .foot {
      padding: 2rem 1.8rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      font-weight: 300;
      color: #ccc;
    }

    /* dark mode — invert everything except the cover image */
    @media (prefers-color-scheme: dark) {
      body { background: #040406; color: #f0ede6; }
      .strip { border-color: #2a2a28; }
      .label { color: #555; }
      .wordmark { color: #f0ede6; }
      .stream-link { color: #f0ede6; border-color: #2a2a28; }
      .stream-link:hover { color: #666; }
      .stream-link1 { color: #f0ede6; border-color: #2a2a28; }
      .stream-link1:hover { color: #666; }
      .arrow { color: #444; }
      .stream-link:hover .arrow { color: #666; }
      .foot { color: #444; }
      .cover { filter: invert(1); }
    }
  </style>
</head>
